name: Deploy to Neocities

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-to-neocities
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install deps and build
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: ls -la dist/

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v2
        with:
          api_token: ${{ secrets.NEOCITIES_API_KEY }}  # ✅ Use api_token (not api_key)
          dist_dir: dist                               # ✅ Your Astro build folder
          cleanup: true                                # ✅ Remove deleted files
          # username is NOT needed in v2 - it's extracted from api_token