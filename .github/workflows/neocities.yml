name: Deploy to Neocities

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-to-neocities
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install deps and build
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: ls -la dist/

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v2  # ✅ Correct version
        with:
          api_key: ${{ secrets.NEOCITIES_API_KEY }}
          username: ${{ secrets.NEOCITIES_USERNAME }}
          dist_dir: dist
          cleanup: true
          neocities_supporter: false
          preview_before_deploy: false  # ✅ Avoids 403 auth error